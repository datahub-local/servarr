debug: true

global:
  apikey: "bb8f28d76ee36FA0CAF60DA41E63E182"
  storageClassName: &storageClassName "nfs"
  ingressClassName: &ingressClassName "traefik"
  certManagerClusterIssuer: &issuer "selfsigned-cluster-issuer"
  authMethod: External

metrics:
  enabled: &metricsEnabled false

initJellyseerr: true
notifications:
  telegram:
    enabled: false
    chat_id: ""
    bot_apitoken: ""

dash:
  username: admin
  password: str0ngP4ssw0rd
  mail: admin@gmail.com
  countryCode: "US"
  preferredLanguage: "en"

torrent:
  username: ci-admin
  password: str0ngP455

indexers: []

volumes:
  storageClass: *storageClassName
  downloads:
    name: &downloads-volume downloads-volume
    size: 1Gi
  media:
    name: &media-volume media-volume
    size: 2Gi
  torrentConfig:
    name: &torrentConfig torrent-config
    size: 250Mi

sonarr:
  metrics:
    main:
      enabled: *metricsEnabled
  ingress:
    sonarr-ing:
      enabled: true
      primary: true
      required: true
      expandObjectName: false
      annotations:
        cert-manager.io/cluster-issuer: *issuer
      ingressClassName: *ingressClassName
      hosts:
        - host: sonarr.media.local
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - sonarr.media.local
          secretName: sonarr-tls
      integrations:
        certManager:
          enabled: false
        traefik:
          enabled: false
  persistence:
    config:
      enabled: true
      type: pvc
      size: 500Mi
      accessModes: ReadWriteMany
      storageClass: *storageClassName
      targetSelector:
        main:
          main:
            mountPath: /config
        exportarr:
          exportarr:
            mountPath: /config
            readOnly: true
    media:
      enabled: true
      type: pvc
      existingClaim: *media-volume
      targetSelector:
        main:
          main:
            mountPath: /mnt/media
    downloads:
      enabled: true
      type: pvc
      existingClaim: *downloads-volume
      targetSelector:
        main:
          main:
            mountPath: /mnt/downloads

